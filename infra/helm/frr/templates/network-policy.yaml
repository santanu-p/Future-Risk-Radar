{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "frr.fullname" . }}-backend
  labels:
    {{- include "frr.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "frr.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from frontend and ingress controller
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow TimescaleDB
    - to: []
      ports:
        - port: {{ .Values.timescaledb.port }}
          protocol: TCP
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
      ports:
        - port: 6379
          protocol: TCP
    # Allow HTTPS egress (external APIs)
    - to: []
      ports:
        - port: 443
          protocol: TCP
{{- end }}
---
{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "frr.fullname" . }}-backend
  labels:
    {{- include "frr.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "frr.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
