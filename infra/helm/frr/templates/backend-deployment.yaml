apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frr.fullname" . }}-backend
  labels:
    {{- include "frr.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "frr.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "frr.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            {{- range .Values.backend.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: FRR_DB_HOST
              value: {{ .Values.timescaledb.host | quote }}
            - name: FRR_DB_PORT
              value: {{ .Values.timescaledb.port | quote }}
            - name: FRR_DB_NAME
              value: {{ .Values.timescaledb.database | quote }}
            - name: FRR_REDIS_URL
              value: "redis://{{ include "frr.fullname" . }}-redis-master:6379/0"
          {{- with .Values.backend.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frr.fullname" . }}-backend
  labels:
    {{- include "frr.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "frr.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
